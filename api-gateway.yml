eureka:
    client:
        fetch-registry: true
        register-with-eureka: true
        service-url:
            defaultZone: http://localhost:8761/eureka/
spring:
    application:
        name: api-gateway
    cloud:
      gateway:
        server:
          webmvc:
            routes:
              - id: order-service-eureka
                uri: lb://order-service-eureka
                predicates:
                  - Path= /api/v1/orders/**
                filters:
                  - AddRequestHeader=token,abcxyz
                  - AddResponseHeader=authen,true
                  - PrefixPath=/api
              - id: ship-service
                uri: lb://ship-service
                predicates:
                  - Path= /api/v1/ships/**

server:
  port: 9898