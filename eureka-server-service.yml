eureka:
    client:
        fetch-registry: false
        register-with-eureka: false
        service-url:
            defaultZone: http://localhost:8761/eureka/
server:
    port: 8761
spring:
    application:
        name: eureka-server-service
    servlet:
        multipart:
            max-file-size: 5MB
            max-request-size: 50MB
